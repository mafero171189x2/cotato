name: Deploy del Worker (API)

on:
  push:
    branches: [main]
    paths:
      - "worker/**"
      - "wrangler.toml"
      - "package.json"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Instalar dependencias (worker-mailer, etc.)
        run: npm install

      - name: Desplegar el Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
